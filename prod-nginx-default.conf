# --- 3. MS AMBAR (STAGING HTTPS) ---
server {
    listen 443 ssl;
    server_name staging.msambar.com www.staging.msambar.com;

    ssl_certificate /etc/letsencrypt/live/staging.msambar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.msambar.com/privkey.pem;

    # Variables para evitar crashes de Nginx si los contenedores no están activos al iniciar
    set $ambar_be_staging http://ambar_staging_backend:8000;
    set $ambar_fe_staging http://ambar_staging_frontend:3000;

    location /static/ {
        alias /app/ambar_staging_static/;
    }

    location /media/ {
        alias /app/ambar_staging_media/;
    }

    location /api/ {
        proxy_pass $ambar_be_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass $ambar_be_staging;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $ambar_fe_staging;
        
        # Soporte para WebSockets (evita errores HMR de Next.js en consola)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- 4. TIERRA VIVA (STAGING HTTPS) ---
