# DNS del resolver interno de Docker (necesario para resolución dinámica de contenedores)
resolver 127.0.0.11 valid=30s;

client_max_body_size 20M;

# --- REDIRECT HTTP TO HTTPS ---
server {
    listen 80;
    server_name tierraviva.com.mx www.tierraviva.com.mx msambar.com www.msambar.com staging.msambar.com www.staging.msambar.com staging.tierraviva.com.mx;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- 1. TIERRA VIVA (PRODUCTION HTTPS) ---
server {
    listen 443 ssl;
    server_name tierraviva.com.mx www.tierraviva.com.mx;

    ssl_certificate /etc/letsencrypt/live/tierraviva.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tierraviva.com.mx/privkey.pem;

    # Variables para evitar crashes de Nginx si los contenedores no están activos al iniciar
    set $tv_be http://tierraviva-prod_backend:8000;
    set $tv_fe http://tierraviva-prod_frontend:3000;

    location /static/ {
        alias /app/tierraviva_static/;
    }

    location /media/ {
        alias /app/tierraviva_media/;
    }

    location ~ ^/(api|admin) {
        proxy_pass $tv_be;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass $tv_fe;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

