name: tierraviva-dev
services:
  backend:
    container_name: tierraviva-dev_backend
    build: ./tierraViva-backend
    env_file: .env
    volumes:
      - ./tierraViva-backend:/app:Z
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: always

  frontend:
    container_name: tierraviva-dev_frontend
    build:
      context: ./tierraViva-front
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

  nginx:
    container_name: tierraviva-dev_nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
    name: tierraviva-dev_postgres_data
  static_volume:
    name: tierraviva-dev_static_volume
  media_volume:
    name: tierraviva-dev_media_volume
