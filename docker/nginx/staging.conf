server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Auto-detected dynamic resolver (injected at container startup)
    resolver PLACEHOLDER_RESOLVER valid=10s;

    # Dynamic backend and frontend hostnames to prevent DNS caching issues (Staging)
    set $backend_host backend-staging;
    set $frontend_host frontend-staging;

    # Django Backend API
    location /api/ {
        proxy_pass http://$backend_host:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl on;

        # CORS Headers (Unified fallback)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Django Admin
    location /admin {
        proxy_pass http://$backend_host:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $http_host;
        proxy_redirect http://backend-staging:8000/ /;
        proxy_redirect https://backend-staging:8000/ /;
    }

    # Static Assets serving (served directly by Nginx for high performance)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media Files serving
    location /media/ {
        alias /app/media/;
    }

    # Frontend (Next.js server with WebSockets HMR support)
    location / {
        proxy_pass http://$frontend_host:3000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # WebSockets upgrade support for Next.js Hot Module Replacement (HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
